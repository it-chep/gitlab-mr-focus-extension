<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GitLab MR Focus</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <p class="eyebrow">GitLab MR Focus</p>
      <h1>Что скрывать</h1>
      <form class="filters" aria-label="Фильтры скрытия">
        <label class="filter-option filter-option-master">
          <input id="select-all" class="filter-checkbox" type="checkbox">
          <span class="filter-copy">
            <span class="filter-title">Выбрать все</span>
            <span class="filter-text">Включить сразу все фильтры, а потом снять лишнее по одному.</span>
          </span>
        </label>
        <label class="filter-option">
          <input class="filter-checkbox" type="checkbox" data-filter="e2e">
          <span class="filter-copy">
            <span class="filter-title">Скрыть e2e</span>
            <span class="filter-text">Скрывать все файлы из директории e2e.</span>
          </span>
        </label>
        <label class="filter-option">
          <input class="filter-checkbox" type="checkbox" data-filter="pb">
          <span class="filter-copy">
            <span class="filter-title">internal/pb/*</span>
            <span class="filter-text">Скрывать generated-файлы из internal/pb.</span>
          </span>
        </label>
        <label class="filter-option">
          <input class="filter-checkbox" type="checkbox" data-filter="test">
          <span class="filter-copy">
            <span class="filter-title">*_test.go</span>
            <span class="filter-text">Скрывать Go-тесты по суффиксу файла.</span>
          </span>
        </label>
        <label class="filter-option">
          <input class="filter-checkbox" type="checkbox" data-filter="mocks">
          <span class="filter-copy">
            <span class="filter-title">mocks</span>
            <span class="filter-text">Скрывать файлы в папках mocks и файлы вида *_mock.go, *_mocks.go.</span>
          </span>
        </label>
      </form>
      <section class="panel">
        <p id="selection-title" class="panel-title"></p>
        <p id="selection-description" class="panel-text"></p>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
